name: Build and Deploy to GCE

on:
  push:
    branches:
      - master

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  REPO: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/xscatter-repo
  IMAGE: xscatter

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 登录 GCP
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # 3. 配置 Docker 使用 GCP 认证
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      # 4. 构建 Docker 镜像
      - name: Build Docker images
        run: |
          docker build --no-cache \
            -t ${{ env.REPO }}/${{ env.IMAGE }}:${{ github.sha }} \
            -t ${{ env.REPO }}/${{ env.IMAGE }}:latest \
            .
          docker build --no-cache \
            -t ${{ env.REPO }}/lrp-service:${{ github.sha }} \
            -t ${{ env.REPO }}/lrp-service:latest \
            ./lrp_service

      # 5. 推送镜像到 Artifact Registry
      - name: Push Docker images
        run: |
          docker push ${{ env.REPO }}/${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.REPO }}/${{ env.IMAGE }}:latest
          docker push ${{ env.REPO }}/lrp-service:${{ github.sha }}
          docker push ${{ env.REPO }}/lrp-service:latest

      # 6. SSH 进入 GCE VM，拉取新镜像并重启应用
      - name: Deploy to GCE
        uses: appleboy/ssh-action@v1.0.3
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        with:
          host: ${{ secrets.GCE_HOST }}
          username: ${{ secrets.GCE_USER }}
          key: ${{ secrets.GCE_SSH_PRIVATE_KEY }}
          envs: ANTHROPIC_API_KEY
          script: |
            cd ~/xscatter
            # Write ANTHROPIC_API_KEY to .env (not in git, persisted on VM)
            grep -v '^ANTHROPIC_API_KEY=' .env 2>/dev/null > .env.tmp || true
            echo "ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}" >> .env.tmp
            mv .env.tmp .env
            # Download model files from GCS if not already present
            mkdir -p lrp_service/model
            if [ ! -f lrp_service/model/model.ckpt-200.index ]; then
              echo "Downloading LRP model from GCS..."
              gcloud storage cp gs://xscatter-model-storage/lrp-model/model/* lrp_service/model/
            fi
            echo "=== $(date) ===" >> ~/deploy.log
            gcloud auth configure-docker us-central1-docker.pkg.dev --quiet >> ~/deploy.log 2>&1
            # Pull and restart main app
            docker compose pull app >> ~/deploy.log 2>&1
            docker compose up -d --force-recreate app >> ~/deploy.log 2>&1
            # Pull and restart lrp-service
            # Extract static images from main app container to host (for lrp-service mount)
            mkdir -p ~/xscatter/static
            docker cp xscatter-app:/app/static/images ~/xscatter/static/ >> ~/deploy.log 2>&1 || true
            docker pull us-central1-docker.pkg.dev/xray-imagemodel-visualization/xscatter-repo/lrp-service:latest >> ~/deploy.log 2>&1
            docker stop xscatter-lrp-service 2>/dev/null || true
            docker rm xscatter-lrp-service 2>/dev/null || true
            docker run -d \
              --name xscatter-lrp-service \
              -p 5001:5001 \
              -v ~/xscatter/lrp_service/model:/model:ro \
              -v ~/xscatter/static/images:/images:ro \
              -e CKPT_PATH=/model/model.ckpt-200 \
              us-central1-docker.pkg.dev/xray-imagemodel-visualization/xscatter-repo/lrp-service:latest >> ~/deploy.log 2>&1
            docker image prune -f >> ~/deploy.log 2>&1
